name: Build plasmoid package

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/.*"Version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' plasmoid/metadata.json | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build .plasmoid package
        run: cd plasmoid && zip -r "../plasma-simpleMonitor-${{ steps.version.outputs.version }}.plasmoid" contents metadata.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plasma-simpleMonitor-${{ steps.version.outputs.version }}
          path: "*.plasmoid"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.plasmoid"
          generate_release_notes: true
